<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleHeader.css">
    <link rel="stylesheet" href="styleAgregar.css">
    <link rel="stylesheet" href="styleFooter.css">
    <title>Document</title>

<body>
    <header>
    <nav class="menu">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="listadoTurnos.html">Turnos</a></li>
            <li><a href="agregarTurno.html">Altas</a></li>
            <li><a href="#">Nosotros</a></li>
        </ul>
    </nav>
    </header>

    <form id="formTurno">

        <label>Nombre</label>
        <input type="text" id="nombre" required>

        <label>Apellido</label>
        <input type="text" id="apellido" required>

        <label>Cédula</label>
        <input type="number" id="cedula" required>

        <label>Teléfono</label>
        <input type="number" id="telefono">

        <label>Especialidad</label>
        <select id="especialidad" required></select>

        <label>Profesional</label>
        <select id="profesional" required></select>

        <label>Fecha y Hora</label>
        <input type="datetime-local" id="fecha_hora" required>

        <label>Observaciones</label>
        <input type="text" id="observaciones">

        <button type="submit">Guardar Turno</button>
    </form>

    <footer class="footer">
        <div class="footer_contenido">
            <p class="footer_titulo">Sistema de Turnos</p>

            <p>Gestión simple y eficiente de citas médicas</p>

            <div class="footer_links">
                <a href="index.html">Inicio</a>
                <a href="listadoTurnos.html">Turnos</a>
                <a href="#">Contacto</a>
            </div>

            <p class="footer_copy">
                © 2026 PulgaLeitesCrackMastodonte - Todos los derechos reservados
            </p>
        </div>
    </footer>
    <script src="../backend/agregar_turno.js"></script>
</body>
</html>
